<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://script.google.com">
  <title>ระบบรับสินค้า (GR)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          colors: { 
            brand: { 
              blue: '#171C8F', 
              orange: '#E35205', 
              blueLight: '#E8E9F4', 
              orangeLight: '#FCECE5',
              navy: '#2B3674',
              gray: '#A3AED0'
            } 
          },
          borderRadius: {
            '3xl': '1.5rem',
            '4xl': '2rem',
          }
        } 
      } 
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-blue: #171C8F;
      --brand-blue-hover: #11146B;
      --brand-orange: #E35205;
      --brand-orange-hover: #B54104;
      --bg-main: #f4f7fe;
      --sidebar-width: 76px;
      --header-height: 4rem;
      --card-radius: 1.5rem;
      --border-color: rgba(226, 232, 240, 0.8);
      
      /* Fluid Scaling */
      --fluid-2xs: clamp(0.69rem, 0.68rem + 0.03vw, 0.71rem);
      --fluid-xs: clamp(0.78rem, 0.76rem + 0.1vw, 0.84rem);
      --fluid-sm: clamp(0.88rem, 0.84rem + 0.17vw, 0.98rem);
      --fluid-base: clamp(1rem, 0.94rem + 0.28vw, 1.15rem);
      --fluid-md: clamp(1.13rem, 1.05rem + 0.4vw, 1.34rem);
      --fluid-lg: clamp(1.27rem, 1.16rem + 0.55vw, 1.56rem);
      --fluid-xl: clamp(1.42rem, 1.28rem + 0.73vw, 1.82rem);
    }

    body { 
      font-family: 'Prompt', 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg-main); 
      color: var(--brand-navy); 
      letter-spacing: -0.01em; 
    }

    /* Italic Overrides */
    .font-italic-bold { font-weight: 700; text-transform: uppercase; }
    
    .glass-card { 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(10px);
      border-radius: var(--card-radius); 
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); 
      border: 1px solid var(--border-color); 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .glass-card:hover { 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); 
      transform: translateY(-2px); 
      border-color: rgba(227, 82, 5, 0.2);
    }

    .input-field { 
      width: 100%; 
      height: 2.75rem;
      padding: 0 1rem; 
      border-radius: 0.875rem; 
      border: 1.5px solid var(--border-color); 
      background: white; 
      outline: none; 
      transition: all 0.2s; 
      font-size: 0.875rem; 
      font-weight: 600;
    }
    .input-field:focus { 
      border-color: var(--brand-orange); 
      box-shadow: 0 0 0 4px rgba(227, 82, 5, 0.1); 
    }

    .sidebar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 1rem;
      color: #A3AED0;
      transition: all 0.3s;
      cursor: pointer;
    }
    .sidebar-item.active {
      background: var(--brand-orange);
      color: white;
      box-shadow: 0 10px 20px rgba(227, 82, 5, 0.2);
    }
    .sidebar-item:hover:not(.active) {
      background: #E8E9F4;
      color: var(--brand-blue);
    }

    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      color: #A3AED0;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .bottom-nav-item.active {
      color: var(--brand-orange);
    }

    /* Status Badges */
    .badge-base {
      padding: 0.25rem 0.75rem;
      border-radius: 0.75rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 10000; display: flex; flex-direction: column; gap: 0.75rem; }
    .toast { min-width: 280px; max-width: 380px; padding: 1rem; border-radius: 1.25rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 0.875rem; animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; background: white; border: 1px solid var(--border-color); }
    
    .loading-active { overflow: hidden; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E9EDF7; border-radius: 10px; }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden leading-relaxed loading-active">

  <!-- Auth UI -->
  <div id="auth-loading" class="fixed inset-0 bg-white z-[9999] flex flex-col justify-center items-center">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-[#171C8F] mb-4"></div>
      <p class="text-[#171C8F] font-bold uppercase tracking-widest">Verifying...</p>
  </div>

  <div id="auth-error" class="fixed inset-0 bg-white z-[9999] hidden flex flex-col justify-center items-center p-6 text-center">
      <div class="glass-card p-8 max-w-md border-rose-100 shadow-xl">
          <i data-lucide="shield-alert" class="w-16 h-16 text-rose-500 mx-auto mb-4"></i>
          <h2 class="text-xl font-bold text-brand-navy mb-2 uppercase">Access Denied</h2>
          <p id="error-message" class="text-slate-500 mb-6 font-medium">คุณไม่มีสิทธิ์เข้าใช้งานแอปพลิเคชันนี้</p>
          <button onclick="window.location.href=APP_CONFIG.PORTAL_URL" class="w-full py-3 bg-brand-blue text-white rounded-xl font-bold uppercase tracking-widest hover:bg-brand-blue-hover transition shadow-lg active:scale-95">Return to Portal</button>
      </div>
  </div>

  <!-- Sidebar (Desktop Only) -->
  <aside id="main-sidebar" class="hidden md:flex flex-col items-center py-6 bg-white border-r border-slate-100 w-[76px] shrink-0 z-50">
      <div class="w-10 h-10 bg-brand-orange rounded-2xl flex items-center justify-center mb-10 shadow-lg shadow-orange-500/20">
          <i data-lucide="package-search" class="w-5 h-5 text-white"></i>
      </div>
      
      <div class="flex flex-col gap-6 flex-1">
          <div onclick="showView('receiving-list-view')" class="sidebar-item active" title="Manifest (List)">
              <i data-lucide="layout-grid" class="w-5 h-5"></i>
          </div>
          <div onclick="showView('receiving-detail-view')" class="sidebar-item" title="Processing (Detail)">
              <i data-lucide="file-text" class="w-5 h-5"></i>
          </div>
      </div>

      <div class="mt-auto flex flex-col gap-6">
          <div onclick="openReceiving(true)" class="sidebar-item" title="Refresh Data">
              <i data-lucide="refresh-cw" class="w-5 h-5"></i>
          </div>
          <div id="logout-btn" class="sidebar-item hover:!text-rose-500" title="Sign Out">
              <i data-lucide="power" class="w-5 h-5"></i>
          </div>
      </div>
  </aside>

  <!-- App Content -->
  <div id="app-content" class="hidden flex-1 flex flex-col h-screen overflow-hidden relative">
      
      <!-- Top Bar -->
      <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-100 shrink-0 z-40 px-4 md:px-8 flex items-center justify-between">
          <div class="flex items-center gap-4">
              <div class="md:hidden w-8 h-8 bg-brand-orange rounded-lg flex items-center justify-center">
                  <i data-lucide="package-search" class="w-4 h-4 text-white"></i>
              </div>
              <div>
                  <h1 class="text-sm md:text-base font-bold text-brand-navy uppercase tracking-tight leading-none">Receiving App</h1>
                  <p class="text-[9px] font-bold text-brand-gray uppercase tracking-widest mt-1 leading-none">Goods Receipt (GR)</p>
              </div>
          </div>

          <div class="flex items-center gap-3">
              <div class="flex flex-col items-end mr-1 text-right">
                  <span id="display-username" class="text-xs font-bold text-brand-navy uppercase tracking-tight leading-none mb-1">...</span>
                  <div class="flex items-center gap-1.5">
                      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                      <span class="text-[8px] font-bold text-brand-gray uppercase tracking-widest leading-none">Active Node</span>
                  </div>
              </div>
              <div class="w-10 h-10 bg-slate-100 rounded-2xl flex items-center justify-center border border-white shadow-inner">
                  <i data-lucide="user" class="w-5 h-5 text-brand-navy"></i>
              </div>
          </div>
      </header>

      <!-- Main Content Area -->
      <main class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar pb-32 md:pb-8">
        <div class="max-w-[1400px] mx-auto">
          
          <!-- Manifest View -->
          <section id="receiving-list-view" class="block animate-fade-in">
            <div class="flex justify-between items-end mb-8">
              <div>
                  <h2 class="text-2xl md:text-3xl font-bold text-brand-navy tracking-tight uppercase">Manifest <span class="text-brand-orange">Pending</span></h2>
                  <p class="text-[10px] font-bold text-brand-gray uppercase tracking-widest mt-1">รายการรอรับสินค้าเข้าคลัง</p>
              </div>
              <div class="flex flex-col items-end gap-2">
                <span class="badge-base bg-brand-orange/10 text-brand-orange border border-brand-orange/20" id="pending-count">0 Manifests</span>
              </div>
            </div>

            <!-- Filters -->
            <div class="mb-10 flex flex-col md:flex-row gap-4">
              <div class="relative flex-1 group">
                  <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-brand-orange transition-colors"></i>
                  <input type="text" id="r-search-input" oninput="renderPOListForReceiving()" placeholder="Search by SKU, Vendor, or PO#..." class="input-field m-0 pl-11 bg-white !h-12 !rounded-2xl border-slate-100 shadow-sm font-bold">
              </div>
              <div class="flex gap-4">
                <select id="r-status-filter" onchange="renderPOListForReceiving()" class="input-field m-0 bg-white shadow-sm border-slate-100 font-bold text-brand-navy uppercase text-xs !h-12 !rounded-2xl appearance-none pr-10 min-w-[160px]">
                  <option value="">📌 ALL STATUS</option>
                  <option value="Overdue">🚨 OVERDUE</option>
                  <option value="Draft GR">📦 DRAFTING</option>
                  <option value="Pending Review">⏳ PROCESSING</option>
                  <option value="Pending GR">🕒 AWAITING</option>
                </select>
                <select id="r-warehouse-filter" onchange="renderPOListForReceiving()" class="input-field m-0 bg-white shadow-sm border-slate-100 font-bold text-brand-blue uppercase text-xs !h-12 !rounded-2xl appearance-none pr-10 min-w-[140px]">
                  <option value="">🏢 ALL HUBS</option>
                  <option value="W1">W1 (WHITE)</option><option value="W2">W2 (ORANGE)</option><option value="W3">W3 (YELLOW)</option>
                  <option value="W4">W4 (GREEN)</option><option value="W5">W5 (GRAY)</option><option value="C1">C1 (SKY)</option><option value="C2">C2 (DEEP)</option>
                </select>
              </div>
            </div>
            
            <!-- List Grid -->
            <div id="po-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
          </section>

          <!-- Detail View -->
          <section id="receiving-detail-view" class="hidden">
            <div class="max-w-4xl mx-auto animate-fade-in">
              <button type="button" onclick="showView('receiving-list-view')" class="inline-flex items-center gap-2 mb-6 text-[10px] font-bold uppercase tracking-widest text-brand-gray hover:text-brand-orange transition-all group">
                <div class="w-8 h-8 bg-white rounded-xl flex items-center justify-center border border-slate-100 group-hover:bg-brand-orange group-hover:text-white transition-all shadow-sm">
                  <i data-lucide="chevron-left" class="w-4 h-4"></i>
                </div>
                Return to Manifest List
              </button>

              <div class="glass-card overflow-hidden border-t-8 border-t-brand-orange">
                <div class="p-6 md:p-8">
                  <!-- Form Header -->
                  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10 pb-10 border-b border-slate-100">
                    <div class="flex items-center gap-5" id="r-display-vendor-header">
                      <!-- Vendor Info Injection -->
                    </div>
                    <div id="r-display-status" class="shrink-0 flex items-center gap-3">
                      <!-- Status Badge Injection -->
                    </div>
                  </div>

                  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                    <div class="bg-slate-50/50 p-6 rounded-3xl border border-slate-100 flex items-center justify-between">
                      <div class="flex flex-col">
                        <span class="text-[9px] font-bold text-brand-gray uppercase tracking-widest mb-2 leading-none">PO REFERENCE</span>
                        <span class="text-xl font-bold text-brand-blue uppercase tracking-tight leading-none" id="r-display-po">-</span>
                      </div>
                      <div class="text-right">
                        <span class="text-[9px] font-bold text-brand-gray uppercase tracking-widest mb-2 leading-none">ORDER DATE</span>
                        <p class="text-sm font-bold text-slate-600 leading-none" id="r-display-date">-</p>
                      </div>
                    </div>
                    
                    <div class="bg-orange-50/30 p-6 rounded-3xl border border-orange-100/50 shadow-inner group transition-all focus-within:ring-4 focus-within:ring-brand-orange/10">
                      <label class="block text-[9px] font-bold text-brand-orange uppercase tracking-widest mb-2 ml-1 leading-none">วันที่มาส่ง (ATA) <span class="text-rose-500">*</span></label>
                      <input type="date" id="r-ata" required class="w-full bg-transparent border-none outline-none text-xl font-bold text-brand-navy tracking-tight">
                    </div>
                  </div>
                  
                  <form id="form-receiving" class="space-y-12" novalidate>
                    <input type="hidden" id="r-group-index">

                    <!-- Manifest Items -->
                    <div>
                      <div class="flex items-center justify-between mb-6 px-1">
                        <h3 class="font-bold text-brand-navy uppercase tracking-tight flex items-center gap-3 text-lg">
                          <i data-lucide="list-checks" class="w-6 h-6 text-brand-blue"></i>
                          Manifest Processing
                        </h3>
                        <button type="button" onclick="readAllPOItems()" class="w-10 h-10 flex items-center justify-center bg-brand-orange text-white rounded-2xl shadow-lg shadow-orange-500/20 hover:scale-110 active:scale-90 transition-all">
                            <i data-lucide="volume-2" class="w-5 h-5"></i>
                        </button>
                      </div>
                      <div id="r-items-container" class="space-y-4"></div>
                    </div>

                    <!-- Extra Items Section -->
                    <div class="bg-indigo-50/20 p-6 md:p-8 rounded-4xl border border-indigo-100/50">
                      <h3 class="font-bold text-brand-blue uppercase tracking-tight mb-6 flex items-center gap-3 text-lg">
                        <i data-lucide="gift" class="w-6 h-6"></i>
                        Extra / Bonus Stock
                      </h3>
                      <div id="r-extra-items-container" class="space-y-4 mb-6"></div>
                      <button type="button" onclick="addExtraItemRow()" class="w-full h-20 border-2 border-dashed border-indigo-200 text-brand-gray bg-white/50 hover:bg-white hover:text-brand-blue hover:border-brand-blue/30 rounded-3xl text-[10px] font-bold uppercase tracking-wider transition-all flex items-center justify-center gap-3 shadow-sm group">
                        <i data-lucide="plus-circle" class="w-5 h-5 group-hover:scale-125 transition-transform"></i> 
                        Append Bonus Item
                      </button>
                    </div>

                    <!-- Lift Fee Hook -->
                    <div id="r-lift-fee-section"></div>

                    <!-- Remarks & Receiver -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                      <div class="bg-slate-50/50 p-6 rounded-3xl border border-slate-100">
                        <label class="block text-[9px] font-bold text-brand-gray uppercase tracking-widest mb-3 ml-1 leading-none">หมายเหตุท้ายบิล (REMARKS)</label>
                        <textarea id="r-remark" class="w-full bg-transparent border-none outline-none text-sm font-bold text-slate-600 min-h-[80px] resize-none" placeholder="ระบุข้อมูลที่จำเป็นสำหรับการตั้งหนี้..."></textarea>
                      </div>
                      <div class="bg-indigo-50/20 p-6 rounded-3xl border border-indigo-100/50 shadow-inner group focus-within:ring-4 focus-within:ring-brand-blue/10 transition-all">
                        <label class="block text-[9px] font-bold text-brand-blue uppercase tracking-widest mb-3 ml-1 leading-none">ผู้รับสินค้า (RECEIVER) <span class="text-rose-500">*</span></label>
                        <input type="text" id="r-receiver" required class="w-full bg-transparent border-none outline-none text-xl font-bold text-brand-navy tracking-tight" placeholder="REQUIRED">
                      </div>
                    </div>

                    <!-- Action Bar -->
                    <div class="pt-10 flex flex-col md:flex-row gap-4">
                      <button type="button" id="btn-draft" class="px-8 py-5 text-[10px] font-bold uppercase tracking-widest bg-white text-brand-gray hover:text-brand-navy border border-slate-200 shadow-sm rounded-2xl transition-all order-2 md:order-1 flex-1 active:scale-95">
                        <i data-lucide="save" class="w-4 h-4 inline mb-0.5 mr-2"></i> Save Draft
                      </button>
                      <button type="button" id="btn-review" class="px-12 py-5 text-sm font-bold uppercase tracking-widest bg-brand-orange text-white rounded-2xl shadow-xl shadow-orange-500/30 active:scale-95 transition-all order-1 md:order-2 flex-[2] hover:bg-brand-orange-hover">
                        <i data-lucide="send" class="w-5 h-5 inline mb-1 mr-2"></i> Submit for Review
                      </button>
                      <button type="button" id="btn-confirm-receive" class="px-12 py-5 text-sm font-bold uppercase tracking-widest bg-emerald-500 text-white rounded-2xl shadow-xl shadow-emerald-500/30 active:scale-95 transition-all order-1 md:order-2 flex-[2] hover:bg-emerald-600 hidden">
                        <i data-lucide="check-circle" class="w-5 h-5 inline mb-1 mr-2"></i> Confirm Final Entry
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </section>

        </div>
      </main>

      <!-- Bottom Nav (Mobile Only) -->
      <nav class="md:hidden fixed bottom-0 left-0 right-0 h-20 bg-white border-t border-slate-100 flex items-center justify-around px-2 z-50">
          <div onclick="showView('receiving-list-view')" class="bottom-nav-item active">
              <i data-lucide="layout-grid" class="w-6 h-6"></i>
              <span>Manifest</span>
          </div>
          <div onclick="showView('receiving-detail-view')" class="bottom-nav-item">
              <i data-lucide="file-text" class="w-6 h-6"></i>
              <span>Process</span>
          </div>
          <div onclick="openReceiving(true)" class="bottom-nav-item">
              <div class="w-12 h-12 bg-brand-orange rounded-full flex items-center justify-center -mt-8 shadow-lg shadow-orange-500/30 text-white border-4 border-white">
                  <i data-lucide="refresh-cw" class="w-5 h-5"></i>
              </div>
          </div>
          <div onclick="window.location.href=APP_CONFIG.PORTAL_URL" class="bottom-nav-item">
              <i data-lucide="home" class="w-6 h-6"></i>
              <span>Portal</span>
          </div>
          <div id="logout-btn-mobile" class="bottom-nav-item">
              <i data-lucide="power" class="w-6 h-6"></i>
              <span>Sign Out</span>
          </div>
      </nav>
  </div>

  <div id="data-loader" class="fixed inset-0 bg-white/80 z-[9000] hidden flex-col justify-center items-center backdrop-blur-sm">
      <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#E35205] mb-4"></div>
      <p class="text-brand-orange font-black uppercase tracking-widest text-[10px]" id="data-loader-text">Syncing...</p>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <script>
    var APP_CONFIG = {
        API_URL: "https://script.google.com/macros/s/AKfycbwv2oGqYocA-k-EN2qjs_rf64gc9kDCG2o2nIKlAW0BDCT0rXLvcgLurCRaQXjuC-OG/exec",
        PORTAL_URL: "./index.html",
        REQUIRED_ROLES: ["ADMIN", "AKRA", "WAREHOUSE"], 
        APP_NAME: "ระบบรับสินค้า (GR)",
        STORAGE_KEY: "akra_session_token"
        };

    var DATA_SCRIPT_URL = "";
    
    var appData = { products: [], pendingPOs: [] };
    var groupedPOs = []; 

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => {
            const voices = window.speechSynthesis.getVoices();
        };
    }

    var UI = {
        showLoading: () => { document.body.classList.add('loading-active'); document.getElementById('auth-loading').classList.remove('hidden'); document.getElementById('auth-error').classList.add('hidden'); document.getElementById('app-content').classList.add('hidden'); },
        showError: (message) => { document.body.classList.remove('loading-active'); document.getElementById('auth-loading').classList.add('hidden'); const errorSection = document.getElementById('auth-error'); errorSection.classList.remove('hidden'); document.getElementById('error-message').innerText = message; },
        showApp: (username) => { document.body.classList.remove('loading-active'); document.getElementById('auth-loading').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); document.getElementById('display-username').innerText = username; }
    };

    let autoRefreshInterval;

    var AuthGuard = {
        init: async () => {
            lucide.createIcons();
            UI.showLoading();
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const ssoToken  = urlParams.get('sso');

                if (ssoToken) {
                    const data = await AKRA_API.login(ssoToken);
                    if (data.status === 'success') {
                        const sessionData = { name: data.user.name, id: data.user.id, roles: data.user.roles };
                        localStorage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify(sessionData));
                        localStorage.setItem('akra_user_data', JSON.stringify(sessionData));
                        window.currentUser = data.user.name;
                        UI.showApp(data.user.name);
                        AuthGuard.bindEvents();
                        await openReceiving();
                        window.history.replaceState({}, document.title, window.location.pathname);
                        return;
                    }
                }

                const cached = localStorage.getItem(APP_CONFIG.STORAGE_KEY) || localStorage.getItem('akra_user_data');
                if (!cached) { UI.showError("กรุณาเข้าสู่ระบบผ่านหน้า Portal"); return; }
                let session = JSON.parse(cached);
                const hasPermission = APP_CONFIG.REQUIRED_ROLES.length === 0 || session.roles.some(r => APP_CONFIG.REQUIRED_ROLES.includes(r));
                if (!hasPermission) { UI.showError("คุณไม่มีสิทธิ์เข้าถึง"); return; }

                window.currentUser = session.name;
                UI.showApp(session.name);
                AuthGuard.bindEvents();
                await openReceiving();
                
            } catch (error) {
                UI.showError("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์เพื่อตรวจสอบสิทธิ์ได้");
            }
        },
        bindEvents: () => {
            const logoutBtns = [document.getElementById('logout-btn'), document.getElementById('logout-btn-mobile')];
            logoutBtns.forEach(btn => {
                if (btn) { 
                    btn.addEventListener('click', () => { 
                        localStorage.removeItem(APP_CONFIG.STORAGE_KEY); 
                        localStorage.removeItem('akra_user_data'); 
                        window.location.href = APP_CONFIG.PORTAL_URL; 
                    }); 
                }
            });
        }
    };

    function showDataLoading(text = 'กำลังโหลด...') { document.getElementById('data-loader-text').innerText = text; document.getElementById('data-loader').classList.remove('hidden'); document.getElementById('data-loader').classList.add('flex'); }
    function hideDataLoading() { document.getElementById('data-loader').classList.add('hidden'); document.getElementById('data-loader').classList.remove('flex'); }
    function showNotification(msg, type='success') {
        const c = document.getElementById('toast-container'); if(!c) return;
        const t = document.createElement('div'); t.className = `toast ${type}`;
        let icon = type === 'success' ? `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-500 flex-shrink-0"></i>` : (type === 'warning' ? `<i data-lucide="alert-triangle" class="w-6 h-6 text-yellow-500 flex-shrink-0"></i>` : `<i data-lucide="x-circle" class="w-6 h-6 text-red-500 flex-shrink-0"></i>`);
        t.innerHTML = `${icon}<div class="flex-1"><p class="text-sm font-medium text-gray-800">${msg}</p></div>`;
        c.appendChild(t); lucide.createIcons({root: t});
        setTimeout(() => { t.classList.add('closing'); t.addEventListener('animationend', () => t.remove()); }, 4000);
    }
    
    function showView(viewId) { 
        if ('speechSynthesis' in window) window.speechSynthesis.cancel(); 
        
        // Update Sections
        document.querySelectorAll('main section').forEach(section => {
            section.classList.add('hidden');
        }); 
        document.getElementById(viewId).classList.remove('hidden'); 
        
        // Update Sidebar Active State
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.classList.remove('active');
            if ((viewId === 'receiving-list-view' && item.title && item.title.includes('Manifest')) || 
                (viewId === 'receiving-detail-view' && item.title && item.title.includes('Processing'))) {
                item.classList.add('active');
            }
        });

        // Update Bottom Nav Active State
        document.querySelectorAll('.bottom-nav-item').forEach(item => {
            item.classList.remove('active');
            const span = item.querySelector('span');
            if (span) {
                if ((viewId === 'receiving-list-view' && span.innerText === 'Manifest') || 
                    (viewId === 'receiving-detail-view' && span.innerText === 'Process')) {
                    item.classList.add('active');
                }
            }
        });

        window.scrollTo(0, 0); 
    }

    async function apiCall(action, payload = null) {
      return await AKRA_API.call(action, payload);
    }

    async function openReceiving(isManualRefresh = false) {
        const cachedData = localStorage.getItem('CACHE_GR_DATA');
        if (cachedData && !isManualRefresh) {
            try {
                appData = JSON.parse(cachedData);
                groupPendingPOs();
                renderPOListForReceiving();
                showView('receiving-list-view');
                showNotification('Syncing with live data...', 'warning');
            } catch(e) { showDataLoading('Syncing manifest...'); }
        } else {
            showDataLoading('Syncing manifest...');
        }

        const response = await AKRA_API.call('getInitialData');
        
        if (!cachedData || isManualRefresh) hideDataLoading();

        if (response.success) { 
            localStorage.setItem('CACHE_GR_DATA', JSON.stringify(response));
            appData = response; 
            groupPendingPOs(); 
            renderPOListForReceiving(); 
            
            if (!cachedData && !isManualRefresh) showView('receiving-list-view'); 
        } else if (!cachedData) { 
            showNotification('Manifest sync failed', 'error'); 
        }
    }

    function groupPendingPOs() {
      const groups = {};
      if(appData.pendingPOs) {
          appData.pendingPOs.forEach(po => {
            const key = po.poNumber + '|' + po.vendor + '|' + po.poDate + '|' + po.warehouse + '|' + po.status;
            if (!groups[key]) groups[key] = { poNumber: po.poNumber, vendor: po.vendor, poDate: po.poDate, warehouse: po.warehouse, status: po.status, items: [] };
            groups[key].items.push(po);
          });
      }
      groupedPOs = Object.values(groups).sort((a, b) => {
        let getScore = (group) => {
            if (group.items.some(i => i.displayStatus === 'Overdue')) return 4;
            if (group.items.some(i => i.status === 'Pending Review')) return 3;
            if (group.items.some(i => i.status === 'Draft GR')) return 2;
            return 1;
        };
        return getScore(b) - getScore(a);
      });
    }

    function renderPOListForReceiving() {
        const container = document.getElementById('po-list-container');
        const filterWh = document.getElementById('r-warehouse-filter').value; 
        const filterStatus = document.getElementById('r-status-filter').value; 
        const search = document.getElementById('r-search-input').value.trim().toLowerCase();
        
        const displayGroups = groupedPOs.filter(g => {
            const hasOverdue = g.items.some(i => i.displayStatus === 'Overdue'); 
            const isDraft = g.items.some(i => i.status === 'Draft GR');
            const isPendingReview = g.items.some(i => i.status === 'Pending Review');
            
            if(filterWh && g.warehouse !== filterWh) return false;
            if(filterStatus === 'Overdue' && !hasOverdue) return false;
            if(filterStatus === 'Draft GR' && !isDraft) return false;
            if(filterStatus === 'Pending Review' && !isPendingReview) return false;
            if(filterStatus === 'Pending GR' && (hasOverdue || isDraft || isPendingReview)) return false;
            
            if(search && !g.vendor.toLowerCase().includes(search) && !g.items.some(i => i.product.toLowerCase().includes(search)) && !(g.poNumber||'').toLowerCase().includes(search)) return false;
            return true;
        });

        document.getElementById('pending-count').innerText = `${displayGroups.length} Manifests`;
        let htmlStr = '';

        displayGroups.forEach(group => {
            const idx = groupedPOs.indexOf(group);

            document.getElementById('btn-review').classList.remove('hidden');
        }
        
        showView('receiving-detail-view');
        lucide.createIcons({ root: document.getElementById('receiving-detail-view') });
    }
        container.innerHTML = htmlStr;

        document.getElementById('r-extra-items-container').innerHTML = '';
        document.getElementById('btn-draft').onclick = (e) => submitReceiving(e, 'Draft GR');
        document.getElementById('btn-review').onclick = (e) => submitReceiving(e, 'Pending Review');
        document.getElementById('btn-confirm-receive').onclick = (e) => submitReceiving(e, 'GR Completed');
        
        if (hasPendingReview) {
            document.getElementById('btn-confirm-receive').classList.remove('hidden');
            document.getElementById('btn-draft').classList.add('hidden');
            document.getElementById('btn-review').classList.add('hidden');
        } else {
            document.getElementById('btn-confirm-receive').classList.add('hidden');
            document.getElementById('btn-draft').classList.remove('hidden');
            document.getElementById('btn-review').classList.remove('hidden');
        }
        
        showView('receiving-detail-view');
        lucide.createIcons({ root: document.getElementById('receiving-detail-view') });
    }

    function setupAutocomplete(inputEl) {
        const suggestionBox = inputEl.nextElementSibling.nextElementSibling;
        inputEl.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase(); suggestionBox.innerHTML = '';
            if (!val || !appData.products || appData.products.length === 0) { suggestionBox.classList.add('hidden'); return; }
            const filtered = appData.products.filter(p => p.name.toLowerCase().includes(val)).slice(0, 15);
            if (filtered.length === 0) { suggestionBox.classList.add('hidden'); return; }
            
            filtered.forEach(p => {
                const li = document.createElement('li'); 
                li.className = 'px-4 py-3 hover:bg-orange-50 cursor-pointer text-sm font-bold text-slate-600 transition-all flex justify-between items-center border-b border-slate-50 last:border-0';
                li.innerHTML = `<span>${p.name}</span> <span class="text-[9px] font-black text-slate-300 uppercase italic tracking-widest">${p.unit}</span>`;
                li.onmousedown = function(e) {
                    e.preventDefault(); inputEl.value = p.name;
                    const row = inputEl.closest('.extra-item-row');
                    row.querySelector('.ex-sku').value = p.sku || ''; 
                    const inputs = row.querySelectorAll('input');
                    inputs[2].value = p.unit || ''; 
                    inputs[3].focus();
                    suggestionBox.classList.add('hidden');
                };
                suggestionBox.appendChild(li);
            });
            suggestionBox.classList.remove('hidden');
        });
        inputEl.addEventListener('blur', () => setTimeout(() => suggestionBox.classList.add('hidden'), 200));
        inputEl.addEventListener('focus', function() { if (this.value && suggestionBox.children.length > 0) suggestionBox.classList.remove('hidden'); });
    }

    async function submitReceiving(e, targetStatus) {
      if (e) e.preventDefault();
      const isDraft = targetStatus === 'Draft GR';
      
      const ataInput = document.getElementById('r-ata'); 
      const receiverInput = document.getElementById('r-receiver');
      if (ataInput) ataInput.classList.remove('input-error'); 
      if (receiverInput) receiverInput.classList.remove('input-error');

      const ata = ataInput ? ataInput.value : ''; 
      const receiverName = receiverInput ? receiverInput.value.trim() : ''; 
      let remark = document.getElementById('r-remark').value.trim();
      
      const liftFeeContainer = document.getElementById('lift-fee-container');
      if (liftFeeContainer) {
          const selectedLiftFee = document.querySelector('input[name="lift-fee"]:checked');
          const liftRounds = document.getElementById('lift-fee-rounds').value.trim();
          const rounds = parseInt(liftRounds);
          
          if (selectedLiftFee && !isNaN(rounds) && rounds > 0) {
              remark = `[ค่าลิฟท์ ${rounds} รอบ ${selectedLiftFee.value}] ` + remark;
          }
      }

      if (!isDraft && (!ata || !receiverName)) {
          if(!ata && ataInput) ataInput.classList.add('input-error'); 
          if(!receiverName && receiverInput) receiverInput.classList.add('input-error');
          return showNotification("กรุณาระบุวันที่รับและชื่อผู้รับให้ครบถ้วนก่อนยืนยัน", "warning");
      }

      const index = document.getElementById('r-group-index').value; 
      if (index === "" || !groupedPOs[index]) return showNotification("ไม่พบข้อมูลรายการที่เลือก", "error");
      
      const group = groupedPOs[index]; 
      let formHasError = false;

      const poItemsData = [];
      document.querySelectorAll('.po-item-row').forEach(row => {
          const poUid = row.dataset.pouid;
          const inputs = row.querySelectorAll('input');
          const grQty = inputs[0].value.trim();
          const unit = inputs[1].value.trim();
          const exp = inputs[2].value.trim();
          const locIn = inputs[3].value.trim();
          const oldStock = inputs[4].value.trim();

          if (!isDraft && grQty && parseFloat(grQty) > 0 && !locIn) {
              inputs[3].classList.add('input-error'); 
              formHasError = true;
          }

          poItemsData.push({ poUid: poUid, grQty, unit, locIn, exp, oldStock });
      });

      const extraItemsData = [];
      document.querySelectorAll('.extra-item-row').forEach(row => {
          const inputs = row.querySelectorAll('input');
          const product = inputs[0].value.trim();
          const sku = inputs[1].value.trim();
          const grQty = inputs[2].value.trim();
          const unit = inputs[3].value.trim();
          const exp = inputs[4].value.trim();
          const locIn = inputs[5].value.trim();
          const oldStock = inputs[6].value.trim();

          if (product || grQty) {
              if (!product) { inputs[0].classList.add('input-error'); formHasError = true; }
              if (!grQty) { inputs[2].classList.add('input-error'); formHasError = true; }
              if (!isDraft && !locIn) { inputs[5].classList.add('input-error'); formHasError = true; }
              if (product && grQty) extraItemsData.push({ sku, product, grQty, unit, locIn, exp, oldStock });
          }
      });

      if (formHasError) return showNotification("กรุณากรอกข้อมูลโลเคชั่น หรือข้อมูลของแถมให้ครบถ้วน", "warning");
      
      const totalReceived = poItemsData.filter(i => i.grQty && parseFloat(i.grQty) > 0).length + extraItemsData.length;
      if (!isDraft && totalReceived === 0) return showNotification("โปรดใส่จำนวนรับสินค้าอย่างน้อย 1 รายการ", "warning");

      const bulkPayload = {
          ata: Utilities_formatDateFrontEnd(ata), 
          receiverName: receiverName, 
          remark: remark.trim(), 
          targetStatus: targetStatus,
          groupInfo: { poDate: group.poDate, vendor: group.vendor, poNumber: group.poNumber, warehouse: group.warehouse },
          items: poItemsData, 
          extraItems: extraItemsData
      };

      let btnId = 'btn-draft';
      if(targetStatus === 'Pending Review') btnId = 'btn-review';
      else if(targetStatus === 'GR Completed') btnId = 'btn-confirm-receive';

      const actionBtn = document.getElementById(btnId);
      if (actionBtn) actionBtn.disabled = true; 
      
      showDataLoading(`กำลังบันทึกข้อมูลเข้าคลัง...`);

      try {
          const res = await AKRA_API.call('bulkReceivePO', bulkPayload);
          if (actionBtn) actionBtn.disabled = false; 
          hideDataLoading();
          
          if(res.success) { 
              let msg = "บันทึกสำเร็จ!";
              if(targetStatus === 'Draft GR') msg = "พักบิล (Draft) เรียบร้อย";
              else if(targetStatus === 'Pending Review') msg = "ส่งให้ตรวจสอบเรียบร้อยแล้ว!";
              else msg = "ยืนยันรับสินค้าเข้าคลังสมบูรณ์!";
              
              showNotification(msg, "success"); 
              showView('receiving-list-view');
              await openReceivingInBackground(); 
          } 
          else { 
              showNotification("เกิดข้อผิดพลาด: " + res.message, "error"); 
          }
      } catch (err) {
          if (actionBtn) actionBtn.disabled = false; 
          hideDataLoading();
          showNotification("ระบบขัดข้อง: " + err.message, "error");
      }
    }

    async function openReceivingInBackground() {
        try {
            const response = await AKRA_API.call('getInitialData');
            if (response.success) { 
                localStorage.setItem('CACHE_GR_DATA', JSON.stringify(response));
                appData = response; 
                groupPendingPOs(); 
                renderPOListForReceiving(); 
            }
        } catch(e) {}
    }

    function parseDateToInput(ddmmyyyy) { if(!ddmmyyyy) return ''; const p = ddmmyyyy.split('/'); if(p.length === 3) return `${p[2]}-${p[1]}-${p[0]}`; return ddmmyyyy; }
    function Utilities_formatDateFrontEnd(dateStr) { if(!dateStr) return ''; const p = dateStr.split('-'); if(p.length === 3) return `${p[2]}/${p[1]}/${p[0]}`; return dateStr; }

    function speakText(text) {
        if (!text) return;
        if ('speechSynthesis' in window) {
            try {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH'; 
                utterance.rate = 1.0; 
                const voices = window.speechSynthesis.getVoices();
                const thaiVoice = voices.find(v => v.lang.includes('th-TH') || v.lang.includes('th_TH'));
                if (thaiVoice) utterance.voice = thaiVoice;
                window.speechSynthesis.speak(utterance);
            } catch (e) { console.error("Speech error:", e); }
        } else { showNotification('อุปกรณ์ของคุณไม่รองรับการอ่านออกเสียง', 'warning'); }
    }

    function readAllPOItems() {
        const index = document.getElementById('r-group-index').value;
        if (index === "" || !groupedPOs[index]) return;
        const group = groupedPOs[index];
        let fullText = "รายการสินค้าที่ต้องรับ มีดังนี้. ";
        group.items.forEach((item, i) => { fullText += `รายการที่ ${i+1}. ${item.product} จำนวน ${item.quantity} ${item.unit || ''}. `; });
        speakText(fullText);
    }
