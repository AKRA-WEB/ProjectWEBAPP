<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://script.google.com">
  <title>แบบฟอร์มขอซื้อสินค้า (PR)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { blue: '#171C8F', blueLight: '#E8E9F4', orange: '#E35205'} } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --brand-blue: #171C8F;
      --brand-blue-hover: #11146B;
      --brand-orange: #E35205;
      --bg-main: #f4f7fe;
      --card-radius: 1.25rem;
      --border-color: #E9EDF7;
    }
    body { font-family: 'Prompt', 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: #2B3674; letter-spacing: -0.01em; }
    .glass-card { background: white; border-radius: var(--card-radius); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); border: 1px solid var(--border-color); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .glass-card:hover { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); transform: translateY(-2px); }
    .input-field { width: 100%; padding: 10px 14px; border-radius: 0.875rem; border: 1px solid var(--border-color); background: #f4f7fe; outline: none; transition: all 0.2s; font-size: 14px; font-weight: 500;}
    .input-field:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(23, 28, 143, 0.08); background: white;}
    .input-error { border-color: #ef4444 !important; box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.1) !important; background-color: #fef2f2 !important; }
    .btn { width: 100%; padding: 12px; border-radius: 0.875rem; font-weight: 700; text-align: center; transition: all 0.2s; cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
    .btn-primary { background: var(--brand-blue); color: white; box-shadow: 0 10px 20px rgba(23, 28, 143, 0.1); }
    .btn-primary:hover:not(:disabled) { background: var(--brand-blue-hover); transform: translateY(-1px); box-shadow: 0 15px 25px rgba(23, 28, 143, 0.15); }
    .btn-primary:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .nav-blur { background: rgba(23, 28, 143, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    
    .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 10000; display: flex; flex-direction: column; gap: 0.75rem; }
    .toast { min-width: 280px; max-width: 380px; padding: 1rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 0.875rem; animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; background: white; border: 1px solid var(--border-color); }
    .toast.closing { animation: slideOutRight 0.3s ease-in forwards; }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    .loading-active { overflow: hidden; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col leading-relaxed loading-active">

  <!-- Auth UI -->
  <div id="auth-loading" class="fixed inset-0 bg-white z-[9999] flex flex-col justify-center items-center">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-[#171C8F] mb-4"></div>
      <p class="text-[#171C8F] font-medium text-lg">กำลังตรวจสอบสิทธิ์...</p>
  </div>
  <div id="auth-error" class="fixed inset-0 bg-white z-[9999] hidden flex flex-col justify-center items-center p-6 text-center">
      <div class="bg-red-50 p-8 rounded-2xl max-w-md border border-red-100 shadow-lg">
          <i data-lucide="shield-alert" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
          <h2 class="text-xl font-bold text-gray-800 mb-2">ปฏิเสธการเข้าถึง</h2>
          <p id="error-message" class="text-gray-600 mb-6">คุณไม่มีสิทธิ์เข้าใช้งานแอปพลิเคชันนี้</p>
          <button onclick="window.location.href=APP_CONFIG.PORTAL_URL" class="px-6 py-2.5 bg-[#171C8F] text-white rounded-lg font-medium hover:bg-[#11146B] transition shadow-md">กลับไปหน้าหลัก (Portal)</button>
      </div>
  </div>

  <!-- App Content -->
  <div id="app-content" class="hidden flex-1 flex flex-col h-screen w-full">
      <nav class="nav-blur text-white sticky top-0 z-30">
        <div class="max-w-3xl mx-auto px-4 sm:px-6">
          <div class="flex justify-between items-center h-14 md:h-16">
            <div class="flex-shrink-0 flex items-center gap-3">
              <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-white/10">
                <i data-lucide="file-plus-2" class="w-5 h-5 text-white"></i>
              </div>
              <h1 class="text-base md:text-lg font-bold tracking-tight">แบบฟอร์มขอซื้อ (PR)</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end mr-2 text-right">
                    <span id="display-username" class="text-xs font-bold leading-none mb-1 italic"></span>
                    <span class="text-[9px] font-bold text-white/50 uppercase tracking-widest leading-none">PR Portal</span>
                </div>
                <button id="logout-btn" class="w-9 h-9 flex items-center justify-center bg-white/10 hover:bg-rose-500/80 rounded-xl transition-all border border-white/10 active:scale-90">
                    <i data-lucide="power" class="w-4 h-4"></i>
                </button>
            </div>
          </div>
        </div>
      </nav>

      <main class="flex-1 overflow-y-auto p-4 md:p-8 w-full max-w-3xl mx-auto pb-20">
        <div class="mb-8 text-center sm:text-left">
            <h2 class="text-2xl font-black text-[#2B3674] tracking-tight italic uppercase">ส่งคำขอสั่งซื้อสินค้า</h2>
            <p class="text-[10px] font-bold text-[#A3AED0] uppercase tracking-widest mt-1 ml-0.5">ข้อมูลจะถูกส่งไปยังฝ่ายจัดซื้อเพื่อพิจารณา</p>
        </div>

        <div class="glass-card p-6 md:p-8 relative border-t-[6px] border-t-brand-blue">
          <form id="form-pr" onsubmit="submitPR(event)" novalidate>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 pb-8 border-b border-indigo-50">
              <div>
                <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 italic">ชื่อผู้ขอซื้อ</label>
                <input type="text" id="pr-requester" required class="input-field bg-[#f4f7fe] cursor-not-allowed opacity-70" readonly>
              </div>
              <div>
                <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 italic">สาขาที่ต้องการ <span class="text-rose-500">*</span></label>
                <select id="pr-warehouse" required class="input-field text-brand-blue font-bold appearance-none">
                  <option value="" disabled selected>เลือกสาขา/คลังสินค้า...</option>
                  <option value="W1">W1 (สีขาว)</option><option value="W2">W2 (สีส้ม)</option>
                  <option value="W3">W3 (สีเหลือง)</option><option value="W4">W4 (สีเขียว)</option>
                  <option value="W5">W5 (สีเทา)</option><option value="C1">C1 (สีฟ้าอ่อน)</option><option value="C2">C2 (สีฟ้าเข้ม)</option>
                </select>
              </div>
            </div>
            
            <div class="mb-4 flex justify-between items-end px-1">
              <h3 class="text-xs font-black text-[#2B3674] uppercase tracking-widest italic">รายการสินค้าที่ต้องการ</h3>
              <span class="text-[10px] font-black text-brand-blue bg-[#f4f7fe] px-3 py-1.5 rounded-xl border border-indigo-50 shadow-sm" id="pr-total-items">1 รายการ</span>
            </div>
            
            <div id="pr-items-container" class="space-y-4"></div>
            
            <button type="button" onclick="addEmptyItemRow()" class="mt-6 w-full border-2 border-dashed border-slate-200 text-slate-400 hover:text-brand-blue hover:border-brand-blue/50 hover:bg-[#f4f7fe] py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 active:scale-95">
              <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มรายการสินค้า
            </button>

            <div class="mt-10 pt-6 border-t border-indigo-50">
              <button type="submit" id="btn-submit-pr" class="btn btn-primary text-base font-bold shadow-xl py-4 italic tracking-wider">
                <i data-lucide="check-circle" class="w-5 h-5"></i> ส่งคำขอสั่งซื้อ (SUBMIT PR)
              </button>
            </div>
          </form>
        </div>

        <div class="mt-14 mb-6 flex justify-between items-center px-1">
            <div>
                <h2 class="text-xl font-black text-[#2B3674] tracking-tight flex items-center gap-2 italic uppercase">
                    <i data-lucide="history" class="w-6 h-6 text-brand-blue"></i> ประวัติคำขอสั่งซื้อ
                </h2>
                <p class="text-[10px] font-bold text-[#A3AED0] uppercase tracking-widest mt-1 ml-0.5">รายการล่าสุดจากฐานข้อมูล</p>
            </div>
            <button type="button" onclick="loadInitialData(true)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm border border-slate-100 text-brand-blue hover:bg-brand-blue hover:text-white transition-all active:scale-90">
                <i data-lucide="rotate-cw" class="w-4 h-4"></i>
            </button>
        </div>
        
        <div id="pr-history-container" class="space-y-4"></div>

      </main>
  </div>

  <div id="data-loader" class="fixed inset-0 bg-white/80 z-[9000] hidden flex-col justify-center items-center backdrop-blur-sm">
      <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#171C8F] mb-4"></div>
      <p class="text-brand-blue font-medium" id="data-loader-text">กำลังประมวลผล...</p>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <script>
    var APP_CONFIG = {
        API_URL: "",
        PORTAL_URL: "./index.html",
        REQUIRED_ROLES: ["ADMIN", "AKRA", "WAREHOUSE", "PURCHASING", "USER"],
        APP_NAME: "แบบฟอร์มขอซื้อสินค้า (PR)",
        STORAGE_KEY: "akra_session_token"
    };
    var DATA_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFb1nyZhZNew_n2S1QoszG1uQaLpXK05vSY9OBwRG3q0GildJQN_ktp-GaEriZw9I/exec";
    
    var appData = { products: [] };
    var UI = {
        showLoading: () => { document.body.classList.add('loading-active'); document.getElementById('auth-loading').classList.remove('hidden'); document.getElementById('auth-error').classList.add('hidden'); document.getElementById('app-content').classList.add('hidden'); },
        showError: (message) => { document.body.classList.remove('loading-active'); document.getElementById('auth-loading').classList.add('hidden'); document.getElementById('auth-error').classList.remove('hidden'); document.getElementById('error-message').innerText = message; },
        showApp: (username) => { document.body.classList.remove('loading-active'); document.getElementById('auth-loading').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); document.getElementById('display-username').innerText = username; document.getElementById('pr-requester').value = username; }
    };

    var AuthGuard = {
        init: async () => {
            lucide.createIcons();
            UI.showLoading();
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const ssoToken = urlParams.get('sso');

                if (ssoToken) {
                    const data = await AKRA_API.login(ssoToken);
                    if (data.status === 'success') {
                        const sessionData = { name: data.user.name, id: data.user.id, roles: data.user.roles };
                        localStorage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify(sessionData));
                        localStorage.setItem('akra_user_data', JSON.stringify(sessionData));
                        window.currentUser = data.user.name;
                        UI.showApp(data.user.name);
                        AuthGuard.bindEvents();
                        await loadInitialData();
                        window.history.replaceState({}, document.title, window.location.pathname);
                        return;
                    }
                }

                const cached = localStorage.getItem(APP_CONFIG.STORAGE_KEY) || localStorage.getItem('akra_user_data');
                if (!cached) { window.location.href = APP_CONFIG.PORTAL_URL; return; }
                let session = JSON.parse(cached);
                const hasPermission = APP_CONFIG.REQUIRED_ROLES.length === 0 || session.roles.some(r => APP_CONFIG.REQUIRED_ROLES.includes(r));
                if (!hasPermission) { UI.showError("คุณไม่มีสิทธิ์เข้าถึง"); return; }

                window.currentUser = session.name;
                UI.showApp(session.name);
                AuthGuard.bindEvents();
                await loadInitialData();
            } catch (error) {
                UI.showError("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์เพื่อตรวจสอบสิทธิ์ได้");
            }
        },
        bindEvents: () => {
            const logoutBtn = document.getElementById('logout-btn');
            if(logoutBtn) { logoutBtn.addEventListener('click', () => { localStorage.removeItem(APP_CONFIG.STORAGE_KEY); localStorage.removeItem('akra_user_data'); window.location.href = APP_CONFIG.PORTAL_URL; }); }
        }
    };
    document.addEventListener('DOMContentLoaded', AuthGuard.init);

    function showDataLoading(text = 'กำลังโหลด...') { document.getElementById('data-loader-text').innerText = text; document.getElementById('data-loader').classList.remove('hidden'); document.getElementById('data-loader').classList.add('flex'); }
    function hideDataLoading() { document.getElementById('data-loader').classList.add('hidden'); document.getElementById('data-loader').classList.remove('flex'); }
    function showNotification(msg, type='success') {
        const c = document.getElementById('toast-container'); if(!c) return;
        const t = document.createElement('div'); t.className = `toast ${type}`;
        let icon = type === 'success' ? `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-500 flex-shrink-0"></i>` : (type === 'warning' ? `<i data-lucide="alert-triangle" class="w-6 h-6 text-yellow-500 flex-shrink-0"></i>` : `<i data-lucide="x-circle" class="w-6 h-6 text-red-500 flex-shrink-0"></i>`);
        t.innerHTML = `${icon}<div class="flex-1"><p class="text-sm font-medium text-gray-800">${msg}</p></div>`;
        c.appendChild(t); lucide.createIcons({root: t});
        setTimeout(() => { t.classList.add('closing'); t.addEventListener('animationend', () => t.remove()); }, 4000);
    }

    async function loadInitialData(isManualRefresh = false) {
        // [CACHE FIRST] Display cached data immediately to reduce perceived wait time
        const cachedInit = localStorage.getItem('CACHE_PR_INIT_DATA');
        const cachedHist = localStorage.getItem('CACHE_PR_HIST_DATA');
        
        let hasCache = false;
        if (cachedInit && cachedHist && !isManualRefresh) {
            try {
                const initData = JSON.parse(cachedInit);
                appData.products = initData.products || [];
                
                const savedWarehouse = localStorage.getItem('pr_warehouse_pref');
                if(savedWarehouse) document.getElementById('pr-warehouse').value = savedWarehouse;
                
                if (document.getElementById('pr-items-container').children.length === 0) addEmptyItemRow();
                
                renderHistoryFromServer(JSON.parse(cachedHist).history);
                hasCache = true;
                
                // If we have cache, we can show the app immediately while updating in background
                UI.showApp(window.currentUser); 
                showNotification('กำลังตรวจสอบข้อมูลล่าสุด...', 'warning');
            } catch(e) { 
                console.error("Cache parsing error:", e);
                showDataLoading('เตรียมความพร้อมระบบ...'); 
            }
        } else {
            showDataLoading('เตรียมความพร้อมระบบ...');
        }

        // --- BACKGROUND DATA FETCHING ---
        // We use a timeout to prevent the user from being stuck forever
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s timeout

        try {
            // Fetch both in parallel for efficiency
            const [initRes, histRes] = await Promise.all([ 
                AKRA_API.call('getInitialData'), 
                AKRA_API.call('getPRHistory') 
            ]);
            
            clearTimeout(timeoutId);
            hideDataLoading();

            if (initRes.success) {
                localStorage.setItem('CACHE_PR_INIT_DATA', JSON.stringify(initRes));
                appData.products = initRes.products || [];
                
                // Only reset the form if it's a manual refresh or we didn't have cache
                if (!hasCache || isManualRefresh) {
                    const savedWarehouse = localStorage.getItem('pr_warehouse_pref');
                    if(savedWarehouse) document.getElementById('pr-warehouse').value = savedWarehouse;
                    document.getElementById('pr-items-container').innerHTML = '';
                    addEmptyItemRow();
                }
            }
            
            if (histRes.success) {
                localStorage.setItem('CACHE_PR_HIST_DATA', JSON.stringify(histRes));
                renderHistoryFromServer(histRes.history);
            }

            // Finally show app if it wasn't shown by cache
            if (!hasCache) UI.showApp(window.currentUser);

        } catch (error) {
            console.error("Fetch error:", error);
            clearTimeout(timeoutId);
            hideDataLoading();
            
            if (!hasCache) {
                UI.showError("ไม่สามารถดึงข้อมูลเริ่มต้นได้ กรุณาลองใหม่อีกครั้ง");
            } else {
                showNotification("ไม่สามารถอัปเดตข้อมูลล่าสุดได้ (ใช้ข้อมูลเก่าแทน)", "error");
            }
        }
    }

    function renderHistoryFromServer(history) {
        const container = document.getElementById('pr-history-container');
        if(!container) return;
        if (!history || history.length === 0) {
            container.innerHTML = '<div class="bg-white p-12 rounded-[2rem] border-2 border-dashed border-slate-100 text-center text-slate-300 text-xs font-bold uppercase tracking-widest italic">ยังไม่มีประวัติการส่งคำขอสั่งซื้อ</div>';
            return;
        }

        const grouped = {};
        history.forEach(item => {
            if(!grouped[item.prNumber]) { grouped[item.prNumber] = { prNumber: item.prNumber, date: item.date, requester: item.requester, warehouse: item.warehouse, status: item.status, items: [] }; }
            grouped[item.prNumber].items.push(item);
        });

        const historyArray = Object.values(grouped);
        
        let htmlStr = '';
        historyArray.forEach(h => {
            let statusBadge = '';
            if(h.status === 'Pending') statusBadge = '<span class="text-[9px] font-black text-amber-600 bg-amber-50 border border-amber-100 px-3 py-1 rounded-xl shadow-sm uppercase tracking-tighter italic"><i data-lucide="clock" class="w-3 h-3 inline mb-0.5"></i> รอพิจารณา</span>';
            else if(h.status === 'Approved') statusBadge = '<span class="text-[9px] font-black text-emerald-600 bg-emerald-50 border border-emerald-100 px-3 py-1 rounded-xl shadow-sm uppercase tracking-tighter italic"><i data-lucide="check-circle" class="w-3 h-3 inline mb-0.5"></i> อนุมัติแล้ว</span>';
            else if(h.status === 'Rejected') statusBadge = '<span class="text-[9px] font-black text-rose-600 bg-rose-50 border border-rose-100 px-3 py-1 rounded-xl shadow-sm uppercase tracking-tighter italic"><i data-lucide="x-circle" class="w-3 h-3 inline mb-0.5"></i> ไม่อนุมัติ</span>';
            else statusBadge = `<span class="text-[9px] font-black text-slate-500 bg-slate-50 border border-slate-100 px-3 py-1 rounded-xl shadow-sm uppercase tracking-tighter italic">${h.status}</span>`;

            const itemsListHtml = h.items.map((item, i) => `
                <div class="flex justify-between items-center text-xs py-1.5 border-b border-slate-50 last:border-0 group">
                    <span class="text-slate-600 font-bold group-hover:text-brand-blue transition-colors">${i+1}. ${item.product}</span>
                    <span class="text-brand-blue font-black italic tracking-tighter">${item.quantity} <span class="text-[10px] font-bold text-slate-400 uppercase">${item.unit || ''}</span></span>
                </div>
            `).join('');

            htmlStr += `
            <div class="glass-card p-5 md:p-6 flex flex-col gap-4 animate-fade-in group">
                <div class="flex justify-between items-start">
                    <div class="flex flex-col gap-1.5">
                        <span class="text-[9px] font-black text-brand-blue bg-[#f4f7fe] px-2.5 py-1 rounded-lg border border-indigo-50 shadow-inner w-fit uppercase tracking-widest">${h.prNumber || 'DRAFT-PR'}</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter italic"><i data-lucide="calendar" class="w-3 h-3 inline mb-0.5 opacity-50"></i> ${h.date}</span>
                    </div>
                    <div>${statusBadge}</div>
                </div>
                
                <div class="bg-[#f4f7fe]/50 rounded-2xl p-4 border border-indigo-50 shadow-inner group-hover:bg-white transition-all">
                    ${itemsListHtml}
                </div>
                
                <div class="flex justify-between items-end px-1">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">ผู้ขอ: <span class="text-[#2B3674]">${h.requester}</span> • <span class="text-brand-blue">${h.warehouse} HUB</span></p>
                </div>
            </div>`;
        });
        
        container.innerHTML = htmlStr;
        lucide.createIcons({ root: container });
    }

    function updateTotalItemsCount() {
        const count = document.getElementById('pr-items-container').children.length;
        document.getElementById('pr-total-items').innerText = `${count} รายการ`;
    }

    function addEmptyItemRow() {
        const container = document.getElementById('pr-items-container');
        const div = document.createElement('div');
        div.className = "item-row bg-[#f4f7fe]/40 p-5 rounded-2xl border border-indigo-50 relative group transition-all hover:bg-white hover:shadow-xl hover:shadow-indigo-900/5 animate-fade-in";
        div.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-12 gap-5">
                <div class="md:col-span-5 relative">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1 italic">ชื่อสินค้า (PRODUCT)</label>
                    <input type="text" class="input-field p-product-input m-0 bg-white font-bold" placeholder="พิมพ์ชื่อสินค้า..." autocomplete="off">
                    <input type="hidden" class="p-sku-input">
                    <ul class="suggestion-box absolute z-50 w-full bg-white border border-slate-100 rounded-2xl shadow-2xl max-h-60 overflow-y-auto hidden mt-2 divide-y divide-slate-50 custom-scrollbar"></ul>
                </div>
                <div class="grid grid-cols-3 md:grid-cols-7 md:col-span-7 gap-4">
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1 italic">จำนวน</label>
                        <input type="number" class="input-field p-qty-input m-0 bg-white text-brand-blue font-black italic tracking-tighter text-lg" placeholder="0" min="1">
                    </div>
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1 italic">หน่วย</label>
                        <input type="text" class="input-field p-unit-input m-0 bg-[#f4f7fe] text-slate-400 font-bold cursor-not-allowed uppercase" placeholder="-" readonly tabindex="-1">
                    </div>
                    <div class="col-span-1 md:col-span-3">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1 italic">หมายเหตุ</label>
                        <input type="text" class="input-field p-remark-input m-0 bg-white text-slate-600 font-medium" placeholder="เช่น ด่วน">
                    </div>
                </div>
            </div>
            <button type="button" onclick="removeRow(this)" class="absolute -top-3 -right-3 w-8 h-8 bg-white text-slate-300 hover:text-rose-500 border border-slate-100 shadow-lg rounded-xl flex items-center justify-center transition-all active:scale-90" title="ลบรายการนี้">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        `;
        container.appendChild(div);
        setupProductAutocomplete(div.querySelector('.p-product-input'));
        updateTotalItemsCount();
        lucide.createIcons({ root: div });
    }

    function removeRow(btn) {
        const container = document.getElementById('pr-items-container');
        if (container.children.length <= 1) { showNotification("ต้องมีรายการสินค้าอย่างน้อย 1 รายการ", 'warning'); return; }
        btn.closest('.item-row').remove();
        updateTotalItemsCount();
    }

    function setupProductAutocomplete(inputEl) {
        const suggestionBox = inputEl.nextElementSibling.nextElementSibling;
        inputEl.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            suggestionBox.innerHTML = '';
            if (!val || appData.products.length === 0) { suggestionBox.classList.add('hidden'); return; }
            
            const filtered = appData.products.filter(p => p.name.toLowerCase().includes(val)).slice(0, 20);
            if (filtered.length === 0) { suggestionBox.classList.add('hidden'); return; }
            
            const frag = document.createDocumentFragment();
            filtered.forEach(p => {
                const li = document.createElement('li');
                li.className = 'px-3 py-2.5 hover:bg-brand-blueLight active:bg-brand-blue/10 cursor-pointer text-sm font-medium text-gray-700 transition flex justify-between items-start gap-2';
                const unitBadge = p.unit ? `<span class="text-[10px] text-brand-blue bg-brand-blueLight px-1.5 py-0.5 rounded border border-brand-blue/20 whitespace-nowrap mt-0.5">${p.unit}</span>` : '';
                li.innerHTML = `<span class="leading-tight break-words">${p.name}</span> ${unitBadge}`;
                
                li.onmousedown = function(e) {
                    e.preventDefault(); e.stopPropagation();
                    inputEl.value = p.name;
                    const row = inputEl.closest('.item-row');
                    row.querySelector('.p-sku-input').value = p.sku || ''; 
                    row.querySelector('.p-unit-input').value = p.unit || ''; 
                    row.querySelector('.p-qty-input').focus();
                    suggestionBox.classList.add('hidden');
                };
                frag.appendChild(li);
            });
            suggestionBox.appendChild(frag);
            suggestionBox.classList.remove('hidden');
        });
        inputEl.addEventListener('blur', function() { setTimeout(() => { suggestionBox.classList.add('hidden'); }, 200); });
        inputEl.addEventListener('focus', function() { if (this.value && suggestionBox.children.length > 0) suggestionBox.classList.remove('hidden'); });
    }

    async function submitPR(e) {
        e.preventDefault();
        
        const requesterInput = document.getElementById('pr-requester');
        const warehouseInput = document.getElementById('pr-warehouse');
        const requester = requesterInput.value.trim();
        const warehouse = warehouseInput.value;

        requesterInput.classList.remove('input-error');
        warehouseInput.classList.remove('input-error');

        if(!requester) { requesterInput.classList.add('input-error'); return showNotification("กรุณาระบุชื่อผู้ขอซื้อ", "warning"); }
        if(!warehouse) { warehouseInput.classList.add('input-error'); return showNotification("กรุณาเลือกสาขา/คลังสินค้า", "warning"); }

        localStorage.setItem('pr_warehouse_pref', warehouse);

        const rows = document.querySelectorAll('#pr-items-container .item-row');
        const itemsToSubmit = [];
        let hasError = false;

        rows.forEach((row, idx) => {
            const prodInput = row.querySelector('.p-product-input');
            const qtyInput = row.querySelector('.p-qty-input');
            prodInput.classList.remove('input-error');
            qtyInput.classList.remove('input-error');

            const sku = row.querySelector('.p-sku-input').value.trim();
            const product = prodInput.value.trim();
            const quantity = qtyInput.value.trim();
            const unit = row.querySelector('.p-unit-input').value.trim();
            const remark = row.querySelector('.p-remark-input').value.trim();

            if(product && quantity) {
                itemsToSubmit.push({ sku, product, quantity, unit, remark });
            } else if (product || quantity) {
                if(!product) prodInput.classList.add('input-error');
                if(!quantity) qtyInput.classList.add('input-error');
                showNotification(`รายการที่ ${idx+1} ข้อมูลไม่ครบถ้วน`, "warning");
                hasError = true;
            }
        });

        if(hasError) return;
        if(itemsToSubmit.length === 0) return showNotification("กรุณาระบุสินค้าที่ต้องการอย่างน้อย 1 รายการ", "warning");

        const btn = document.getElementById('btn-submit-pr');
        btn.disabled = true;
        showDataLoading('กำลังส่งคำขอสั่งซื้อ...');

        const payload = { requester, warehouse, items: itemsToSubmit };
        const res = await AKRA_API.call('submitPR', payload);

        if(res.success) {
            showNotification('ส่งคำขอสั่งซื้อเรียบร้อยแล้ว!', 'success');
            const histRes = await AKRA_API.call('getPRHistory');
            if(histRes.success) {
                localStorage.setItem('CACHE_PR_HIST_DATA', JSON.stringify(histRes));
                renderHistoryFromServer(histRes.history);
            }
            
            document.getElementById('pr-items-container').innerHTML = '';
            addEmptyItemRow();
            window.scrollTo(0, 0);
        } else {
            showNotification('เกิดข้อผิดพลาด: ' + (res.message || res.error), 'error');
        }
        btn.disabled = false;
        hideDataLoading();
    }
  </script>
