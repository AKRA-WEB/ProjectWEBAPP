<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบเบิกจ่ายสินค้า TRD-AKRA</title>
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#171C8F',
                            orange: '#E35205',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    
    <style>
        :root {
            --brand-blue: #171C8F;
            --brand-orange: #E35205;
            --sidebar-width: clamp(72px, 8vw, 76px);
            --header-height: 4rem;
            --bg-main: #f8fafc;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body { 
            font-family: 'Prompt', 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main);
            color: #1e293b;
            overflow: hidden;
        }

        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { display: block; width: 4px; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Premium Sidebar (Desktop Only) */
        .sidebar { width: var(--sidebar-width); background: white; transition: all 0.3s ease; border-right: 1px solid #f1f5f9; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { display: none; } }
        
        .nav-link { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; padding: 1rem 0; color: #94a3b8; transition: all 0.2s ease; cursor: pointer; position: relative; }
        .nav-link.active { color: var(--brand-blue); }
        .nav-link.active::after { content: ''; position: absolute; right: 0; top: 20%; bottom: 20%; width: 4px; background: var(--brand-blue); border-radius: 4px 0 0 4px; }
        .nav-link i { font-size: 1.2rem; }
        .nav-link span { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Mobile Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; padding-bottom: var(--safe-bottom); z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.03); }
        .mobile-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; padding: 0.75rem 0; color: #94a3b8; transition: all 0.2s; }
        .mobile-link.active { color: var(--brand-blue); }
        .mobile-link i { font-size: 1.25rem; }
        .mobile-link span { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        @media (min-width: 1025px) { .bottom-nav { display: none; } }

        .akra-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgb(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--brand-blue);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-primary:hover { background-color: #121670; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-orange {
            background-color: var(--brand-orange);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-orange:hover { background-color: #c94804; transform: translateY(-1px); }

        .input-ci {
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-ci:focus {
            background-color: white;
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(23, 28, 143, 0.05);
        }
        
    </style>
</head>
<body class="antialiased h-screen flex">

    <!-- Auth Loading Overlay -->
    <div id="auth-loading" class="fixed inset-0 bg-white z-[9999] flex flex-col justify-center items-center">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-slate-100 border-t-[#171C8F]"></div>
        <p class="text-slate-400 font-medium text-xs mt-6 tracking-widest animate-pulse">กำลังตรวจสอบข้อมูล...</p>
    </div>

    <!-- Security Error Overlay -->
    <div id="auth-error" class="fixed inset-0 bg-white z-[9999] hidden flex flex-col justify-center items-center p-6 text-center">
        <div class="akra-card p-10 max-w-sm shadow-2xl border-rose-50 border">
            <i data-lucide="lock" class="w-10 h-10 text-rose-500 mx-auto mb-6"></i>
            <h2 class="text-xl font-bold text-slate-800 mb-2">ไม่สามารถเข้าถึงได้</h2>
            <p id="error-message" class="text-slate-400 text-sm mb-8 px-4">ระบบไม่พบสิทธิ์การใช้งานของคุณ</p>
            <button onclick="window.location.href='./index.html'" class="w-full h-12 bg-[#2B3674] text-white rounded-xl font-bold transition active:scale-95">กลับสู่หน้าหลัก</button>
        </div>
    </div>

    <!-- Main Sidebar (Desktop Only) -->
    <aside id="main-sidebar" class="sidebar flex flex-col h-full z-50">
        <div class="p-6 flex justify-center">
            <div class="w-12 h-12 bg-brand-blue rounded-xl flex items-center justify-center shadow-lg text-white font-bold text-xl">TRD</div>
        </div>
        <nav class="flex-1 mt-6">
            <div onclick="setView('w1')" id="nav-w1" class="nav-link active">
                <i data-lucide="store"></i>
                <span>W1 (หน้าร้าน)</span>
            </div>
            <div onclick="setView('w2')" id="nav-w2" class="nav-link">
                <i data-lucide="warehouse"></i>
                <span>W2 (คลัง)</span>
            </div>
            <div onclick="setView('dashboard')" id="nav-dashboard" class="nav-link">
                <i data-lucide="bar-chart-3"></i>
                <span>วิเคราะห์</span>
            </div>
        </nav>
        <div class="p-8 flex flex-col items-center gap-6">
            <button onclick="fetchInitialData(true)" class="text-slate-400 hover:text-brand-blue transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            <button onclick="AuthGuard.logout()" class="text-rose-300 hover:text-rose-600 transition-colors"><i data-lucide="power" class="w-5 h-5"></i></button>
        </div>
    </aside>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <div onclick="setView('w1')" id="mob-w1" class="mobile-link active">
            <i data-lucide="store"></i>
            <span>W1</span>
        </div>
        <div onclick="setView('w2')" id="mob-w2" class="mobile-link">
            <i data-lucide="warehouse"></i>
            <span>W2</span>
        </div>
        <div onclick="setView('dashboard')" id="mob-dashboard" class="mobile-link">
            <i data-lucide="bar-chart-3"></i>
            <span>วิเคราะห์</span>
        </div>
    </nav>

    <!-- App Container Wrapper -->
    <div id="app-content" class="hidden flex flex-1 h-screen w-full overflow-hidden">
        <main class="flex-1 h-full flex flex-col overflow-hidden relative bg-[#f8fafc]">
            
            <!-- Optimized Top Bar -->
            <header class="h-14 md:h-16 flex items-center justify-between px-6 md:px-10 bg-white/80 backdrop-blur-xl sticky top-0 z-30 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div>
                        <h2 class="text-base md:text-lg font-bold text-slate-800 tracking-tight" id="page-title">ระบบเบิกจ่ายสินค้า</h2>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="fetchInitialData(true)" class="sm:hidden w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 shadow-sm text-slate-400"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                    <div class="flex items-center gap-3 bg-slate-50 p-1.5 rounded-full shadow-sm pr-4 cursor-pointer hover:bg-slate-100 transition-colors" onclick="AuthGuard.logout()">
                        <div class="flex flex-col items-end hidden sm:flex">
                            <p id="display-username" class="text-[11px] font-bold text-slate-700 leading-none mb-0.5">...</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none">ออกจากระบบ</p>
                        </div>
                        <div class="w-8 h-8 bg-brand-blue/10 rounded-full flex items-center justify-center shadow-inner text-brand-blue text-xs font-bold"><i data-lucide="user" class="w-4 h-4"></i></div>
                    </div>
                </div>
            </header>

            <!-- Scrollable Viewport -->
            <div id="main-viewport" class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 pb-24 md:pb-12">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <!-- UI Notification Hub -->
    <div id="toast" class="fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-800/95 backdrop-blur-xl text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-3 min-w-[200px] transition-all duration-300 transform translate-y-20 opacity-0 pointer-events-none">
        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400" id="toast-icon"></i>
        <span id="toast-msg" class="text-sm font-medium">สำเร็จ</span>
    </div>

    <script>
        // ==========================================
        // 0. CONFIGURATION & AUTH (AKRA SSO v2)
        // ==========================================
        var APP_CONFIG = {
            PORTAL_URL:     "./index.html",
            STORAGE_KEY:    "akra_transfer_session_token",
            REQUIRED_ROLES: ["ADMIN", "AKRA", "TRD", "WAREHOUSE"],
            APP_NAME:       "ระบบเบิกจ่ายสินค้า (TRD-AKRA)"
        };

        var AuthGuard = {
            init: async () => {
                const loadingEl = document.getElementById('auth-loading');
                if(loadingEl) loadingEl.classList.remove('hidden');
                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const ssoToken = urlParams.get('sso');
                    if (ssoToken) {
                        const data = await AKRA_API.login(ssoToken);
                        if (data.status === 'success') {
                            localStorage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify({ name: data.user.name, id: data.user.id, roles: data.user.roles }));
                            localStorage.setItem('akra_user_data', JSON.stringify({ name: data.user.name, roles: data.user.roles }));
                            window.history.replaceState({}, document.title, window.location.pathname);
                            AuthGuard.startApp(data.user);
                            return;
                        }
                    }
                    const cached = localStorage.getItem(APP_CONFIG.STORAGE_KEY) || localStorage.getItem('akra_user_data');
                    if (!cached) { window.location.href = APP_CONFIG.PORTAL_URL; return; }
                    let session = JSON.parse(cached);
                    const hasPermission = APP_CONFIG.REQUIRED_ROLES.length === 0 || session.roles.some(r => APP_CONFIG.REQUIRED_ROLES.includes(r));
                    if (!hasPermission) { 
                        if(loadingEl) loadingEl.classList.add('hidden');
                        const errEl = document.getElementById('auth-error');
                        if(errEl) errEl.classList.remove('hidden');
                        return; 
                    }
                    
                    AuthGuard.startApp(session);
                } catch (error) {
                    if(loadingEl) loadingEl.classList.add('hidden');
                    const errEl = document.getElementById('auth-error');
                    if(errEl) errEl.classList.remove('hidden');
                }
            },
            startApp: (user) => {
                window.currentUser = user.name;
                window.currentUserId = user.id;
                
                const nameDisplay = document.getElementById('display-username'); 
                if(nameDisplay) nameDisplay.innerText = window.currentUser || "ผู้ใช้งาน";
                
                const loadingEl = document.getElementById('auth-loading'); 
                if(loadingEl) loadingEl.classList.add('hidden'); 
                const appContent = document.getElementById('app-content'); 
                if(appContent) appContent.classList.remove('hidden');

                render(); 
                fetchInitialData();
            },
            logout: () => {
                localStorage.removeItem(APP_CONFIG.STORAGE_KEY);
                localStorage.removeItem('akra_user_data');
                window.location.href = APP_CONFIG.PORTAL_URL;
            }
        };

        // UI Helpers
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = msg;
            if(isError) {
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.classList.remove('text-emerald-400');
                icon.classList.add('text-rose-400');
            } else {
                icon.setAttribute('data-lucide', 'check-circle');
                icon.classList.remove('text-rose-400');
                icon.classList.add('text-emerald-400');
            }
            lucide.createIcons();
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function sendAppLog(action, details) {
            if(window.AKRA_API) AKRA_API.sendLog(action, APP_CONFIG.APP_NAME, details, window.currentUser);
        }

        // ==========================================
        // 1. CONFIGURATION & STATE
        // ==========================================
        let state = {
            view: 'w1', 
            w1Tab: 'request', 
            w2Tab: 'tasks', 
            dashboardFilter: 'week', 
            selectedReceiveId: null, 
            items: [], 
            products: [],
            loading: false
        };

        // ==========================================
        // 2. API FUNCTIONS (FETCH) & DATE FORMATTERS
        // ==========================================
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;

            const optionsDate = { timeZone: 'Asia/Bangkok', day: '2-digit', month: '2-digit', year: 'numeric' };
            const optionsTime = { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', hour12: false };
            
            let datePart = d.toLocaleDateString('th-TH', optionsDate).replace(/\//g, '-'); 
            let timePart = d.toLocaleTimeString('th-TH', optionsTime);

            return `${datePart} / ${timePart} น.`;
        }

        function convertToCE(dateStr) {
            if (!dateStr) return dateStr;
            const regex = /^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/;
            const match = dateStr.trim().match(regex);
            if (match) {
                let day = match[1].padStart(2, '0');
                let month = match[2].padStart(2, '0');
                let year = parseInt(match[3], 10);
                if (year > 2500) year -= 543;
                return `${day}-${month}-${year}`; 
            }
            return dateStr; 
        }

        function formatExpiryDate(val) {
            if (!val || val === 'ไม่ได้ระบุ') return val;
            if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}T/)) {
                const d = new Date(val);
                if (!isNaN(d.getTime())) {
                    return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear() + 543}`;
                }
            }
            if (typeof val === 'string') {
                const regex = /^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/;
                const match = val.trim().match(regex);
                if (match) {
                    let year = parseInt(match[3], 10);
                    if (year > 1900 && year < 2500) year += 543;
                    return `${match[1].padStart(2, '0')}-${match[2].padStart(2, '0')}-${year}`;
                }
            }
            return val;
        }

        function parseCustomDate(dateStr) {
            if (!dateStr) return new Date(0);
            const isoTry = new Date(dateStr);
            if (!isNaN(isoTry.getTime()) && String(dateStr).includes('T')) return isoTry;

            try {
                const parts = String(dateStr).split('/');
                if (parts.length >= 1) {
                    const dSplit = parts[0].trim().split('-');
                    if (dSplit.length === 3) {
                        const day = parseInt(dSplit[0], 10);
                        const month = parseInt(dSplit[1], 10) - 1;
                        let year = parseInt(dSplit[2], 10);
                        if (year > 2500) year -= 543; 

                        let hrs = 0, mins = 0;
                        if (parts.length > 1) {
                            const tSplit = parts[1].replace('น.', '').trim().split(':');
                            if (tSplit.length >= 2) { 
                                hrs = parseInt(tSplit[0], 10); 
                                mins = parseInt(tSplit[1], 10); 
                            }
                        }
                        const pDate = new Date(year, month, day, hrs, mins);
                        if (!isNaN(pDate.getTime())) return pDate;
                    }
                }
            } catch(e) {}
            return new Date();
        }

        async function fetchInitialData(isRefresh = false) {
            if(state.loading) return;
            state.loading = true;
            if(isRefresh) showToast('กำลังรีเฟรชข้อมูล...');
            try {
                const res = await AKRA_API.call('getTransfers');
                if (res.success) {
                    state.items = (res.items || []).map(item => {
                        return {
                            ...item,
                            id: item.id,
                            itemName: item.item_name,
                            requestQty: item.request_qty,
                            status: item.status,
                            oldExpiry: formatExpiryDate(item.old_expiry),
                            newExpiry: formatExpiryDate(item.new_expiry),
                            receiveQty: item.receive_qty,
                            receiveNote: item.receive_note,
                            w2Note: item.w2_note,
                            storageCapacity: parseInt(item.storage_capacity) || 0,
                            rawDate: parseCustomDate(item.created_at),
                            timestamp: formatDateTime(item.created_at)
                        };
                    });

                    state.products = (res.products || []).map(p => {
                        if (typeof p === 'object' && p !== null) return p.product_name || p.name || p[0] || '';
                        return String(p).trim();
                    }).filter(p => p !== '');

                    render();
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                showToast('ไม่สามารถเชื่อมต่อฐานข้อมูลได้', true);
            } finally { state.loading = false; }
        }

        async function syncDataToSheet() {
            try {
                await AKRA_API.call('submitTransfer', state.items);
            } catch (error) {
                console.error('Error saving data:', error); showToast('เกิดข้อผิดพลาดในการบันทึก', true);
            }
        }
        
        // ==========================================
        // 3. AUTOCOMPLETE SEARCH LOGIC
        // ==========================================
        function filterProducts(query) {
            const listDiv = document.getElementById('autocomplete-list');
            if (!listDiv) return;

            const q = query.toLowerCase().trim();
            let filtered = !q ? state.products.slice(0, 50) : state.products.filter(p => p.toLowerCase().includes(q)).slice(0, 50);

            if (filtered.length === 0) {
                listDiv.innerHTML = state.products.length === 0 ? 
                    `<div class="p-5 text-center"><i data-lucide="alert-circle" class="w-8 h-8 text-rose-300 mx-auto mb-2"></i><p class="text-sm font-semibold text-rose-500">ไม่พบฐานข้อมูลสินค้า</p></div>` : 
                    `<div class="p-4 text-sm text-slate-400 text-center">ไม่พบสินค้าที่ค้นหา</div>`;
            } else {
                listDiv.innerHTML = filtered.map(p => `
                    <div onmousedown="selectProduct(decodeURIComponent('${encodeURIComponent(p)}'))" 
                         class="px-4 py-3 hover:bg-slate-50 hover:text-brand-blue cursor-pointer border-b border-slate-50 text-sm text-slate-700 last:border-0 truncate flex items-center gap-3 transition-colors">
                        <i data-lucide="package" class="w-4 h-4 text-slate-400 shrink-0"></i> ${p}
                    </div>
                `).join('');
            }
            listDiv.classList.remove('hidden');
            lucide.createIcons({ root: listDiv });
        }

        function selectProduct(name) {
            const input = document.getElementById('w1-itemName');
            if (input) input.value = name;
            document.getElementById('autocomplete-list').classList.add('hidden');
        }

        // ==========================================
        // 4. ACTION HANDLERS
        // ==========================================
        function updateNavState() {
            const navs = ['w1', 'w2', 'dashboard'];
            navs.forEach(n => {
                const el = document.getElementById(`nav-${n}`);
                const mobEl = document.getElementById(`mob-${n}`);
                if(el) el.classList.toggle('active', state.view === n);
                if(mobEl) mobEl.classList.toggle('active', state.view === n);
            });
            const titleEl = document.getElementById('page-title');
            if(titleEl) {
                if(state.view === 'w1') titleEl.innerText = 'หน้าร้าน (W1)';
                if(state.view === 'w2') titleEl.innerText = 'คลังสินค้า (W2)';
                if(state.view === 'dashboard') titleEl.innerText = 'วิเคราะห์การเบิกจ่าย';
            }
        }

        function setView(viewName) { 
            state.view = viewName; 
            state.selectedReceiveId = null; 
            updateNavState();
            render(); 
        }
        function setW1Tab(tabName) { state.w1Tab = tabName; state.selectedReceiveId = null; render(); }
        function setW2Tab(tabName) { state.w2Tab = tabName; state.selectedReceiveId = null; render(); }
        function setDashboardFilter(val) { state.dashboardFilter = val; render(); }

        async function handleW1Submit(event) {
            event.preventDefault();
            const itemName = document.getElementById('w1-itemName').value;
            const qty = document.getElementById('w1-qty').value;
            const storageCapacity = document.getElementById('w1-storageCapacity').value;
            const oldExpiryInput = document.getElementById('w1-oldExpiry').value;

            if (!itemName || !qty) return;

            const now = new Date();
            const newItem = {
                id: `REQ-${Math.floor(Math.random() * 9000) + 1000}`,
                rawDate: now,
                timestamp: formatDateTime(now.toISOString()),
                itemName: itemName,
                requestQty: parseInt(qty),
                storageCapacity: storageCapacity ? parseInt(storageCapacity) : 0, 
                status: 'สั่งเบิก',
                oldExpiry: oldExpiryInput ? convertToCE(oldExpiryInput) : 'ไม่ได้ระบุ',
                newExpiry: '', receiveQty: null, receiveNote: '', w2Note: '' 
            };

            state.items.unshift(newItem); 
            state.w1Tab = 'pending'; 
            render(); 
            
            showToast('ส่งคำขอเบิกสินค้าเรียบร้อยแล้ว');
            await syncDataToSheet(); 
            sendAppLog("สั่งเบิกสินค้า (TRD)", `เบิก: ${itemName} จำนวน ${qty} ชิ้น`);
        }

        function openReceiveForm(id) { state.selectedReceiveId = id; render(); }

        async function handleDispatchSubmit(event, id, reqQty) {
            event.preventDefault();
            const dispatchQty = parseInt(document.getElementById(`disp-qty-${id}`).value);
            const newExpiryInput = document.getElementById(`disp-exp-${id}`).value;
            const noteInput = document.getElementById(`w2-note-${id}`);
            const w2NoteValue = noteInput ? noteInput.value : '';
            
            const newExpiry = newExpiryInput ? convertToCE(newExpiryInput) : 'ไม่ได้ระบุ';

            let note = 'ครบ';
            if (dispatchQty < reqQty) note = `ขาด ${reqQty - dispatchQty}`;
            if (dispatchQty > reqQty) note = `เกิน ${dispatchQty - reqQty}`;

            let dispatchedItemName = "";

            state.items = state.items.map(item => {
                if (item.id === id) {
                    dispatchedItemName = item.itemName;
                    return { ...item, status: 'จัดส่งแล้ว', receiveQty: dispatchQty, receiveNote: note, newExpiry: newExpiry, w2Note: w2NoteValue || item.w2Note };
                }
                return item;
            });

            state.selectedReceiveId = null;
            render();
            showToast('จัดส่งสินค้าสำเร็จ');
            await syncDataToSheet();
            sendAppLog("จัดส่งสินค้า (AKRA)", `จัดส่ง: ${dispatchedItemName} ยอด ${dispatchQty}`);
        }

        async function updateItemStatus(id, newStatus) {
            const noteInput = document.getElementById(`w2-note-${id}`);
            const w2NoteValue = noteInput ? noteInput.value : '';
            let targetItemName = "";

            state.items = state.items.map(item => {
                if (item.id === id) {
                    targetItemName = item.itemName;
                    return { ...item, status: newStatus, w2Note: w2NoteValue || item.w2Note };
                }
                return item;
            });
            render();
            await syncDataToSheet();
            sendAppLog("เปลี่ยนสถานะ (AKRA)", `สถานะ: ${newStatus}`);
        }

        // --- Render Dashboard ---
        function getInsightDetails(itemName, qty, count, capacity) {
            const avgQty = Math.round(qty / count);
            const maxCapacity = capacity || 30;

            if (count >= 3 && qty >= maxCapacity * 1.5) {
                return { 
                    icon: 'flame', 
                    title: 'ขายไว / ควรขยายพื้นที่', 
                    desc: `ความจุหน้าร้านเก็บได้ ${maxCapacity} ชิ้น แต่เบิกรวมไปถึง ${qty} ชิ้น (ออกบ่อย ${count} รอบ) สินค้าหมดเชลฟ์ไวมาก แนะนำขยายพื้นที่จัดเก็บ`,
                    color: 'text-orange-500', bg: 'bg-orange-50', border: 'border-orange-100'
                };
            }

            if (avgQty > maxCapacity) {
                return {
                    icon: 'shopping-cart', 
                    title: 'เบิกเกินความจุ (Overstock)', 
                    desc: `เบิกเฉลี่ย ${avgQty} ชิ้น/บิล ซึ่งล้นความจุหน้าร้าน (${maxCapacity} ชิ้น) อาจมีโปรโมชั่นหรือจัดพื้นที่สต๊อคนอกเชลฟ์`,
                    color: 'text-blue-500', bg: 'bg-blue-50', border: 'border-blue-100'
                };
            }

            if (count >= 3 && avgQty <= maxCapacity / 2) {
                return { 
                    icon: 'package-open', 
                    title: 'ทยอยเติม (ตามพื้นที่)', 
                    desc: `เบิกบ่อย ${count} บิล ทีละ ${avgQty} ชิ้น (เต็มความจุ ${maxCapacity} ชิ้น) พนักงานต้องคอยเติมเรื่อยๆ เป็นการเบิกตามพื้นที่วางโชว์`,
                    color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-100'
                };
            }

            if (qty >= maxCapacity * 0.5 && qty <= maxCapacity * 1.2) {
                return {
                    icon: 'store', 
                    title: 'เบิกเติมเต็ม (Restock)', 
                    desc: `เบิกรวม ${qty} ชิ้น ใกล้เคียงกับความจุหน้าร้าน (${maxCapacity} ชิ้น) เป็นการทยอยเติมและจัดการสต๊อคที่สมดุลดีมาก`,
                    color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-100'
                };
            }

            return { 
                icon: 'check-circle', 
                title: 'การเคลื่อนไหวปกติ', 
                desc: `ยอดเบิกเฉลี่ย ${avgQty} ชิ้น ความจุหน้าร้าน ${maxCapacity} ชิ้น อยู่ในระดับมาตรฐานการจัดการทั่วไป`,
                color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200'
            };
        }

        function renderDashboard() {
            const filter = state.dashboardFilter;
            const now = new Date();
            let startDate = new Date(now);

            if (filter === 'week') {
                const day = startDate.getDay();
                const diff = startDate.getDate() - day + (day === 0 ? -6 : 1); 
                startDate.setDate(diff);
                startDate.setHours(0,0,0,0);
            } else {
                startDate = new Date(now.getFullYear(), now.getMonth(), 1); 
            }

            const dispatchedItems = state.items.filter(i => {
                const d = i.rawDate ? new Date(i.rawDate) : new Date(0);
                return (i.status === 'จัดส่งแล้ว' || i.status === 'รับสินค้าแล้ว') && d >= startDate;
            });
            
            let totalQty = 0;
            let totalOrders = dispatchedItems.length;
            const itemStats = {};

            dispatchedItems.forEach(item => {
                const qty = parseInt(item.receiveQty) || 0;
                const capacity = parseInt(item.storageCapacity) || 0;
                totalQty += qty;

                if (!itemStats[item.itemName]) {
                    itemStats[item.itemName] = { count: 0, qty: 0, capacity: 0 };
                }
                itemStats[item.itemName].count += 1;
                itemStats[item.itemName].qty += qty;
                if(capacity > itemStats[item.itemName].capacity) {
                    itemStats[item.itemName].capacity = capacity;
                }
            });

            const topItems = Object.keys(itemStats).map(key => ({
                name: key, count: itemStats[key].count, qty: itemStats[key].qty, capacity: itemStats[key].capacity
            })).sort((a, b) => b.qty - a.qty).slice(0, 10); 

            return `
                <div class="w-full flex flex-col animate-fade-in max-w-4xl mx-auto">
                    
                    <div class="flex justify-center mb-6">
                        <div class="bg-white p-1 rounded-xl flex w-full max-w-[280px] shadow-sm border border-slate-100">
                            <button onclick="setDashboardFilter('week')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all ${filter === 'week' ? 'bg-slate-100 text-brand-blue shadow-sm' : 'text-slate-400 hover:bg-slate-50'}">สัปดาห์นี้</button>
                            <button onclick="setDashboardFilter('month')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all ${filter === 'month' ? 'bg-slate-100 text-brand-blue shadow-sm' : 'text-slate-400 hover:bg-slate-50'}">เดือนนี้</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-brand-blue p-5 rounded-2xl shadow-sm text-white relative overflow-hidden">
                            <i data-lucide="package" class="absolute -right-2 -bottom-2 w-16 h-16 opacity-10"></i>
                            <p class="text-[10px] font-bold text-blue-200 uppercase tracking-widest mb-1">ยอดส่งรวม</p>
                            <p class="text-3xl font-bold">${totalQty.toLocaleString()} <span class="text-xs font-medium text-blue-200">ชิ้น</span></p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">จำนวนบิล</p>
                            <p class="text-3xl font-bold text-slate-800">${totalOrders.toLocaleString()} <span class="text-xs font-medium text-slate-400">ใบ</span></p>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i data-lucide="sparkles" class="w-4 h-4 text-brand-orange"></i> วิเคราะห์พฤติกรรมการเบิก
                        </h3>
                        ${topItems.length === 0 ? renderEmptyState('ไม่มีข้อมูลในช่วงเวลานี้', 'database') : `
                            <div class="space-y-4">
                                ${topItems.map((item, idx) => {
                                    const insight = getInsightDetails(item.name, item.qty, item.count, item.capacity);
                                    return `
                                        <div class="akra-card p-5">
                                            <div class="flex justify-between items-start mb-4">
                                                <div class="flex-1 pr-3">
                                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Rank #${idx + 1}</span>
                                                    <h4 class="font-bold text-slate-800 text-[15px] leading-tight mt-1">${item.name}</h4>
                                                </div>
                                                <div class="text-right">
                                                    <p class="font-bold text-slate-800 text-lg leading-none">${item.qty.toLocaleString()}</p>
                                                    <p class="text-[10px] text-slate-400 font-semibold mt-1 uppercase">${item.count} orders</p>
                                                </div>
                                            </div>
                                            <div class="${insight.bg} ${insight.border} border p-4 rounded-xl flex gap-3 items-start">
                                                <div class="bg-white p-2 rounded-lg shadow-sm shrink-0">
                                                    <i data-lucide="${insight.icon}" class="${insight.color} w-4 h-4"></i>
                                                </div>
                                                <div>
                                                    <p class="text-xs font-bold ${insight.color} mb-1">${insight.title}</p>
                                                    <p class="text-[10px] text-slate-600 font-medium leading-relaxed">${insight.desc}</p>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // Main Render Function
        function render() {
            const root = document.getElementById('main-viewport');
            if (state.view === 'w1') { root.innerHTML = renderW1(); } 
            else if (state.view === 'w2') { root.innerHTML = renderW2(); }
            else if (state.view === 'dashboard') { root.innerHTML = renderDashboard(); }
            
            updateNavState();
            lucide.createIcons();
        }

        // ==========================================
        // 6. INITIALIZATION
        // ==========================================
        window.onload = async function() {
            await AuthGuard.init();
        };

        // Hook into render to create icons
        const originalRender = render;
        render = function() {
            originalRender();
            setTimeout(() => lucide.createIcons(), 50);
        };

    </script>
</body>
</html>
